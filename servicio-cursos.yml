spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    #cambio hecho para poder construir un contenedor
    #url: jdbc:mysql://localhost:3306/curso?serverTimezone=UTC #127.0.0.1
    url: jdbc:mysql://192.168.1.19:3306/curso?serverTimezone=UTC
    username: root
    password: Admin
    #propiedades para que hibernate cree adecuadamente las instrucciones SQL
  jpa:
    hibernate:
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 8500
springdoc:
  packages-to-scan:
  - com.cursos.securizados.controller
  paths-to-match:
  - /**
eureka:
  client:
    service-url:
      defaultZone: http://192.168.1.19:8761/eureka #http://localhost:8761/eureka || http://192.168.1.19:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: instanciaCursos3 #instanciaCursos1 || instanciaCursos2
    #instance-id: ${spring.application.name}:instanciaCursos:${random.value}
    prefer-ip-address: true #si no pongo esto error de DNS al ir con http://localhost...., incluso en el postman tambien
    hostname: 192.168.1.19
    non-secure-port: 8500
